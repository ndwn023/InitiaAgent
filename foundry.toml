[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
solc           = "0.8.24"
optimizer      = true
optimizer_runs = 200
via_ir         = true
fs_permissions = [{ access = "read-write", path = "./" }]

gas_reports = [
  "AgentVault",
  "AgentExecutor",
  "ProfitSplitter",
  "AgentRegistry"
]

[profile.ci]
fuzz      = { runs = 2000 }
invariant = { runs = 512, depth = 20 }

[rpc_endpoints]
initia_local   = "http://localhost:8545"
initia_testnet = "${INITIA_TESTNET_RPC}"
evm_testnet    = "https://jsonrpc-evm-1.anvil.asia-southeast.initia.xyz"

