[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
solc           = "0.8.24"
optimizer      = true
optimizer_runs = 200
via_ir         = true

gas_reports = [
  "AgentVault",
  "AgentExecutor",
  "ProfitSplitter",
  "AgentRegistry"
]

[profile.ci]
fuzz      = { runs = 2000 }
invariant = { runs = 512, depth = 20 }

[rpc_endpoints]
initia_local   = "http://localhost:8545"
initia_testnet = "${INITIA_TESTNET_RPC}"
evm_testnet    = "https://jsonrpc-evm-1.anvil.asia-southeast.initia.xyz"

[etherscan]
evm_testnet = { key = "empty", url = "https://scan.testnet.initia.xyz/api/evm-1", chain = 2124225178762456 }
